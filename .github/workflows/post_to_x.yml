name: Bulk Post to X

on:
  workflow_dispatch:
    inputs:
      links:
        description: "Links to post, separated by commas"
        required: true
      caption_source:
        description: "Where captions come from"
        type: choice
        options:
          - csv
          - custom
        default: csv
      custom_caption:
        description: "Only used if caption_source=custom. Use \\n for line breaks, e.g. Line one\\nLine two\\n\\n#tag1 #tag2"
        required: false
        default: ""
      interval_minutes:
        description: "Minutes to wait between each post"
        required: false
        default: "10"
      shuffle:
        description: "Post links in random order? (true/false)"
        required: false
        default: "false"

jobs:
  bulk-post:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # hard cap on GitHub-hosted runners
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Restore X session
        env:
          STATE_JSON: ${{ secrets.X_STORAGE_STATE_JSON }}
        run: printf '%s' "$STATE_JSON" > x_storage_state.json

      - name: Bulk post
        env:
          LINKS: ${{ github.event.inputs.links }}
          CAPTION_SOURCE: ${{ github.event.inputs.caption_source }}
          CUSTOM_CAPTION: ${{ github.event.inputs.custom_caption }}
          INTERVAL_MINUTES: ${{ github.event.inputs.interval_minutes }}
          SHUFFLE_ORDER: ${{ github.event.inputs.shuffle }}
        run: python bulk_post_to_x.py
